<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EE-Solver</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --primary: #6c63ff;
      --primary-hover: #5a52e0;
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --accent: #22c55e;
      --error: #ef4444;
      --tool-bg: #1e2130;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── 헤더 ── */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    /* ── 입력 영역 ── */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .question-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      color: var(--text);
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .question-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .question-input::placeholder {
      color: var(--text-muted);
    }

    /* ── 이미지 업로드 ── */
    .upload-area {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .file-drop {
      flex: 1;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
      font-size: 0.9rem;
      position: relative;
    }
    .file-drop:hover, .file-drop.dragover {
      border-color: var(--primary);
      background: rgba(108, 99, 255, 0.05);
    }
    .file-drop input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .file-drop .icon { font-size: 1.5rem; margin-bottom: 0.3rem; }

    .image-preview {
      display: none;
      position: relative;
      max-width: 200px;
    }
    .image-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .image-preview .remove-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      background: var(--error);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 버튼 ── */
    .actions {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
    }

    .solve-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .solve-btn:hover { background: var(--primary-hover); }
    .solve-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 결과 영역 ── */
    .result-section {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .result-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-header h2 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-status {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      font-weight: 500;
    }
    .result-status.success { background: rgba(34,197,94,0.15); color: var(--accent); }
    .result-status.error { background: rgba(239,68,68,0.15); color: var(--error); }

    .result-body {
      padding: 1.5rem;
    }

    .answer-content {
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .answer-content h1, .answer-content h2, .answer-content h3 {
      margin-top: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .answer-content h3 { font-size: 1.1rem; }
    .answer-content p { margin-bottom: 0.7rem; }
    .answer-content ul, .answer-content ol {
      margin-left: 1.5rem;
      margin-bottom: 0.7rem;
    }
    .answer-content li { margin-bottom: 0.3rem; }
    .answer-content strong { color: #a78bfa; }
    .answer-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }
    .answer-content code {
      background: var(--bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    /* ── 계산 기록 ── */
    .calc-log {
      margin-top: 1rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .calc-log summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .calc-log summary:hover { color: var(--text); }

    .calc-items {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .calc-item {
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .calc-item .tool-name { color: var(--accent); font-weight: 600; }
    .calc-item .tool-result { color: #facc15; }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .app { padding: 1rem; }
      .upload-area { flex-direction: column; }
      .image-preview { max-width: 100%; }
      .image-preview img { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <div class="header">
      <h1>⚡ EE-Solver</h1>
      <p>전기공학 문제 풀이 — Gemini + MCP Calculator</p>
    </div>

    <!-- 입력 영역 -->
    <div class="input-section">
      <textarea
        class="question-input"
        id="questionInput"
        placeholder="전기공학 문제를 입력하세요...&#10;예: 10V 전원에 2옴과 3옴 직렬저항이 연결되어 있다. 전류를 구해라"
        rows="3"
      ></textarea>

      <div class="upload-area">
        <div class="file-drop" id="fileDrop">
          <input type="file" id="fileInput" accept="image/*">
          <div class="icon">📷</div>
          <div>회로도 이미지를 드래그하거나 클릭하여 업로드</div>
        </div>
        <div class="image-preview" id="imagePreview">
          <img id="previewImg" src="" alt="미리보기">
          <button class="remove-btn" id="removeBtn">✕</button>
        </div>
      </div>

      <div class="actions">
        <button class="solve-btn" id="solveBtn" onclick="submitSolve()">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">풀이 시작</span>
        </button>
      </div>
    </div>

    <!-- 결과 영역 -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <h2>📝 풀이 결과</h2>
        <span class="result-status" id="resultStatus"></span>
      </div>
      <div class="result-body">
        <div class="answer-content" id="answerContent"></div>
        <div class="calc-log" id="calcLog" style="display:none">
          <details>
            <summary>🔧 MCP 계산 기록 (<span id="calcCount">0</span>건)</summary>
            <div class="calc-items" id="calcItems"></div>
          </details>
        </div>
      </div>
    </div>
  </div>

  <script>
    const questionInput = document.getElementById('questionInput');
    const fileInput = document.getElementById('fileInput');
    const fileDrop = document.getElementById('fileDrop');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const removeBtn = document.getElementById('removeBtn');
    const solveBtn = document.getElementById('solveBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const resultSection = document.getElementById('resultSection');
    const resultStatus = document.getElementById('resultStatus');
    const answerContent = document.getElementById('answerContent');
    const calcLog = document.getElementById('calcLog');
    const calcCount = document.getElementById('calcCount');
    const calcItems = document.getElementById('calcItems');

    let selectedFile = null;

    // ── 파일 선택/드래그 ──
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) showPreview(e.target.files[0]);
    });

    fileDrop.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileDrop.classList.add('dragover');
    });
    fileDrop.addEventListener('dragleave', () => {
      fileDrop.classList.remove('dragover');
    });
    fileDrop.addEventListener('drop', (e) => {
      e.preventDefault();
      fileDrop.classList.remove('dragover');
      if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
    });

    removeBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      imagePreview.style.display = 'none';
      fileDrop.style.display = '';
    });

    function showPreview(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        imagePreview.style.display = 'block';
        fileDrop.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // ── 클립보드 붙여넣기 ──
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          showPreview(item.getAsFile());
          break;
        }
      }
    });

    // ── Ctrl+Enter 전송 ──
    questionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        submitSolve();
      }
    });

    // ── 풀이 요청 ──
    async function submitSolve() {
      const question = questionInput.value.trim();
      if (!question) {
        questionInput.focus();
        return;
      }

      // UI 상태: 로딩
      solveBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = '풀이 중...';
      resultSection.style.display = 'none';

      const formData = new FormData();
      formData.append('question', question);
      if (selectedFile) {
        formData.append('image', selectedFile);
      }

      try {
        const res = await fetch('/solve', { method: 'POST', body: formData });
        const data = await res.json();

        resultSection.style.display = 'block';

        if (data.success) {
          resultStatus.textContent = '성공';
          resultStatus.className = 'result-status success';

          // Markdown → HTML 렌더링
          answerContent.innerHTML = marked.parse(data.answer || '');

          // KaTeX 수식 렌더링
          renderMathInElement(answerContent, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\[', right: '\\]', display: true },
              { left: '\\(', right: '\\)', display: false },
            ],
            throwOnError: false,
          });

          // 계산 기록
          if (data.calculations && data.calculations.length > 0) {
            calcLog.style.display = 'block';
            calcCount.textContent = data.calculations.length;
            calcItems.innerHTML = data.calculations.map((c) =>
              `<div class="calc-item">
                <span class="tool-name">${c.tool}</span>(${JSON.stringify(c.args)})
                → <span class="tool-result">${c.result}</span>
              </div>`
            ).join('');
          } else {
            calcLog.style.display = 'none';
          }
        } else {
          resultStatus.textContent = '오류';
          resultStatus.className = 'result-status error';
          answerContent.innerHTML = `<p style="color:var(--error)">❌ ${data.error}</p>`;
          calcLog.style.display = 'none';
        }
      } catch (err) {
        resultSection.style.display = 'block';
        resultStatus.textContent = '오류';
        resultStatus.className = 'result-status error';
        answerContent.innerHTML = `<p style="color:var(--error)">❌ 서버 연결 실패: ${err.message}</p>`;
        calcLog.style.display = 'none';
      } finally {
        solveBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = '풀이 시작';
      }

      // 결과로 스크롤
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
</body>
</html>
